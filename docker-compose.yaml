services:

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/cv_analyzer.db
      DATA_DIR: /app/data
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - ${APP_PORT:-8000}:80

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
